<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JEXI - Sarcastic AI Chatbot</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
        sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background-color: #0f0f0f;
      color: #ffffff;
    }

    #root {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .chat-container {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      background-color: #0f0f0f;
      height: 100vh;
    }

    .chat-header {
      background-color: #1a1a1a;
      border-bottom: 1px solid #333333;
      padding: 16px;
      flex-shrink: 0;
    }

    .chat-header h1 {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .chat-header p {
      font-size: 12px;
      color: #aaaaaa;
    }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      display: flex;
      margin-bottom: 12px;
      animation: fadeIn 0.3s ease-in;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      justify-content: flex-end;
    }

    .message.assistant {
      justify-content: flex-start;
    }

    .message-bubble {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 16px;
      word-wrap: break-word;
      line-height: 1.5;
    }

    .message.user .message-bubble {
      background-color: #00d4ff;
      color: #000000;
    }

    .message.assistant .message-bubble {
      background-color: #1a1a1a;
      color: #ffffff;
      border: 1px solid #333333;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      background-color: #1a1a1a;
      border: 1px solid #333333;
      border-radius: 16px;
      width: fit-content;
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #aaaaaa;
      animation: bounce 1.4s infinite;
    }

    .typing-dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {
      0%, 80%, 100% {
        opacity: 0.5;
      }
      40% {
        opacity: 1;
      }
    }

    .input-area {
      border-top: 1px solid #333333;
      background-color: #0f0f0f;
      padding: 12px 16px;
      flex-shrink: 0;
    }

    .input-wrapper {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .input-field {
      flex: 1;
      background-color: #1a1a1a;
      border: 1px solid #333333;
      border-radius: 24px;
      padding: 12px 16px;
      color: #ffffff;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      max-height: 100px;
    }

    .input-field::placeholder {
      color: #aaaaaa;
    }

    .input-field:focus {
      outline: none;
      border-color: #00d4ff;
    }

    .send-button {
      background-color: #00d4ff;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      color: #000000;
      font-weight: bold;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }

    .send-button:hover:not(:disabled) {
      opacity: 0.8;
    }

    .send-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0, 0, 0, 0.2);
      border-top: 2px solid #000000;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Scrollbar styling */
    .messages-container::-webkit-scrollbar {
      width: 6px;
    }

    .messages-container::-webkit-scrollbar-track {
      background: transparent;
    }

    .messages-container::-webkit-scrollbar-thumb {
      background: #333333;
      border-radius: 3px;
    }

    .messages-container::-webkit-scrollbar-thumb:hover {
      background: #555555;
    }

    @media (max-width: 600px) {
      .message-bubble {
        max-width: 85%;
      }

      .chat-header {
        padding: 12px;
      }

      .input-area {
        padding: 8px 12px;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const BACKEND_URL = 'http://localhost:3000';

    function ChatApp() {
      const [messages, setMessages] = useState([
        {
          id: '1',
          role: 'assistant',
          content: 'Oh great, another human who needs my help. What do you want?',
          timestamp: new Date(),
        },
      ]);
      const [inputText, setInputText] = useState('');
      const [loading, setLoading] = useState(false);
      const messagesEndRef = useRef(null);

      const scrollToBottom = () => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      };

      useEffect(() => {
        scrollToBottom();
      }, [messages]);

      const sendMessage = async () => {
        if (!inputText.trim()) return;

        const userMessage = {
          id: Date.now().toString(),
          role: 'user',
          content: inputText,
          timestamp: new Date(),
        };

        setMessages((prev) => [...prev, userMessage]);
        setInputText('');
        setLoading(true);

        try {
          const formattedMessages = messages
            .concat(userMessage)
            .map((msg) => ({
              role: msg.role,
              content: msg.content,
            }));

          const response = await fetch(`${BACKEND_URL}/chat`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ messages: formattedMessages }),
          });

          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }

          const data = await response.json();

          const assistantMessage = {
            id: (Date.now() + 1).toString(),
            role: 'assistant',
            content: data.response,
            timestamp: new Date(),
          };

          setMessages((prev) => [...prev, assistantMessage]);
        } catch (error) {
          console.error('Error sending message:', error);
          const errorMessage = {
            id: (Date.now() + 1).toString(),
            role: 'assistant',
            content: 'Ugh, something went wrong. Try again, will you?',
            timestamp: new Date(),
          };
          setMessages((prev) => [...prev, errorMessage]);
        } finally {
          setLoading(false);
        }
      };

      const handleKeyPress = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      };

      return (
        <div className="chat-container">
          <div className="chat-header">
            <h1>JEXI</h1>
            <p>Your sarcastic AI assistant</p>
          </div>

          <div className="messages-container">
            {messages.map((message) => (
              <div key={message.id} className={`message ${message.role}`}>
                <div className="message-bubble">{message.content}</div>
              </div>
            ))}
            {loading && (
              <div className="message assistant">
                <div className="typing-indicator">
                  <div className="typing-dot"></div>
                  <div className="typing-dot"></div>
                  <div className="typing-dot"></div>
                </div>
              </div>
            )}
            <div ref={messagesEndRef} />
          </div>

          <div className="input-area">
            <div className="input-wrapper">
              <textarea
                value={inputText}
                onChange={(e) => setInputText(e.target.value)}
                onKeyPress={handleKeyPress}
                placeholder="Say something to Jexi..."
                disabled={loading}
                className="input-field"
                rows="1"
              />
              <button
                onClick={sendMessage}
                disabled={loading || !inputText.trim()}
                className="send-button"
              >
                {loading ? <div className="loading-spinner"></div> : '→'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<ChatApp />, document.getElementById('root'));
  </script>
</body>
</html>
