<script>
  const messagesBox = document.getElementById("messages");
  const input = document.getElementById("msg");
  const sendBtn = document.getElementById("sendBtn");

  let messages = JSON.parse(localStorage.getItem("jexi_messages") || "[]");

  function saveMessages() {
    localStorage.setItem("jexi_messages", JSON.stringify(messages));
  }

  function addMessage(role, text) {
    const div = document.createElement("div");
    div.className = "msg " + role;
    div.innerHTML = `<b>${role === "user" ? "You" : "Jexi"}:</b> ${text}`;
    messagesBox.appendChild(div);
    messagesBox.scrollTop = messagesBox.scrollHeight;
  }

  function renderMessages() {
    messagesBox.innerHTML = "";
    messages.forEach((m) => {
      addMessage(m.role === "assistant" ? "jexi" : "user", m.content);
    });
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    const userMsg = { role: "user", content: text };
    messages.push(userMsg);
    saveMessages();
    addMessage("user", text);
    input.value = "";

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ messages })
      });

      const data = await res.json();
      const reply = data.response || "Jexi glitched. Classic.";

      const aiMsg = { role: "assistant", content: reply };
      messages.push(aiMsg);
      saveMessages();
      addMessage("jexi", reply);
    } catch (err) {
      const failMsg = { role: "assistant", content: "Network error. You probably broke something." };
      messages.push(failMsg);
      saveMessages();
      addMessage("jexi", failMsg.content);
    }
  }

  sendBtn.addEventListener("click", sendMessage);

  input.addEventListener("keydown", function (e) {
    if (e.key === "Enter") {
      sendMessage();
    }
  });

  renderMessages();
</script>
