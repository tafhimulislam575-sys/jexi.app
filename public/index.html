<script>
const input = document.querySelector("input");
const button = document.querySelector("button");
const chat = document.body;

let messages = [];

button.onclick = send;
input.addEventListener("keypress", e=>{
  if(e.key==="Enter") send();
});

async function send(){
  const text = input.value.trim();
  if(!text) return;

  messages.push({role:"user",content:text});

  const userLine = document.createElement("p");
  userLine.innerHTML = "<b>You:</b> " + text;
  chat.insertBefore(userLine,input.parentElement);

  input.value="";

  const res = await fetch("/chat",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({messages})
  });

  const data = await res.json();

  const reply = data.response || data.reply || data.generated_text || "Jexi is thinking...";

  messages.push({role:"assistant",content:reply});

  const aiLine = document.createElement("p");
  aiLine.innerHTML = "<b>Jexi:</b> " + reply;
  chat.insertBefore(aiLine,input.parentElement);
}
</script>
